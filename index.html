<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <title>LION AI</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <style>
    *{box-sizing:border-box;margin:0;padding:0;-webkit-font-smoothing:antialiased;-webkit-tap-highlight-color:transparent}
    html{height:100%;height:-webkit-fill-available}
    body{
      height:100%;height:-webkit-fill-available;
      font-family:'Inter',-apple-system,BlinkMacSystemFont,sans-serif;
      background:#000;color:rgba(255,255,255,.92);overflow:hidden;
    }

    #sky{position:fixed;inset:0;z-index:0;width:100%;height:100%}

    .app{
      position:relative;z-index:1;
      height:100%;height:-webkit-fill-available;
      display:flex;flex-direction:column;align-items:center;justify-content:center;
      padding:env(safe-area-inset-top,16px) 14px env(safe-area-inset-bottom,14px);
      gap:9px;
    }

    /* ── ULTRA TRANSPARENT GLASS ── */
    .g{
      background:rgba(255,255,255,0.01);
      border:1px solid rgba(255,255,255,0.16);
      backdrop-filter:blur(24px) saturate(160%);
      -webkit-backdrop-filter:blur(24px) saturate(160%);
      box-shadow:inset 0 1px 0 rgba(255,255,255,0.2), 0 4px 24px rgba(0,0,0,0.2);
    }

    /* ── HEADER ── */
    .header{
      width:100%;max-width:540px;flex-shrink:0;
      display:flex;align-items:center;gap:12px;
      animation:up .7s cubic-bezier(.16,1,.3,1) both;
    }
    .logo{width:42px;height:42px;border-radius:13px;flex-shrink:0;display:flex;align-items:center;justify-content:center;position:relative;}
    .logo-l{font-size:22px;font-weight:600;color:rgba(255,255,255,.9);line-height:1;position:relative;z-index:1;}
    .logo-star{position:absolute;font-size:8px;color:rgba(255,255,255,.65);line-height:1;}
    .logo-star.s1{top:6px;right:7px}.logo-star.s2{bottom:7px;left:7px}
    .htext h1{font-size:19px;font-weight:600;letter-spacing:.05em;line-height:1;}
    .htext p{font-size:11px;color:rgba(255,255,255,.38);margin-top:3px}
    .pill{margin-left:auto;flex-shrink:0;display:inline-flex;align-items:center;gap:5px;padding:4px 10px;border-radius:100px;font-size:11px;font-weight:500;color:rgba(255,255,255,.4);}
    .pdot{width:5px;height:5px;border-radius:50%;background:#4ade80;animation:blink 2s infinite}
    @keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}

    /* ── API ── */


    /* ── CHAT CARD ── */
    .chat-card{
      width:100%;max-width:540px;flex:1;min-height:0;
      display:flex;flex-direction:column;border-radius:22px;overflow:hidden;
      animation:up .7s .1s cubic-bezier(.16,1,.3,1) both;
      background:rgba(255,255,255,0.01);
      border:1px solid rgba(255,255,255,0.14);
      backdrop-filter:blur(24px) saturate(160%);
      -webkit-backdrop-filter:blur(24px) saturate(160%);
      box-shadow:inset 0 1px 0 rgba(255,255,255,0.18), 0 16px 48px rgba(0,0,0,0.3), 0 0 0 .5px rgba(255,255,255,.04);
    }

    .topbar{
      padding:11px 15px;border-bottom:1px solid rgba(255,255,255,.08);
      display:flex;align-items:center;justify-content:space-between;flex-shrink:0;
      background:rgba(0,0,0,.05);
    }
    .tl{display:flex;align-items:center;gap:9px}
    .space-av{width:30px;height:30px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;overflow:hidden;border:1px solid rgba(255,255,255,.15);}
    .space-av svg{width:26px;height:26px}
    .tname{font-size:13px;font-weight:600;letter-spacing:.03em}
    .tsub{font-size:10px;color:rgba(255,255,255,.35);margin-top:1px}
    .clr-btn{background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.1);border-radius:8px;padding:5px 11px;font-size:11px;color:rgba(255,255,255,.38);cursor:pointer;font-family:inherit;}
    .clr-btn:active{background:rgba(255,255,255,.1);color:rgba(255,255,255,.85)}

    /* messages — fully transparent */
    .msgs{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:14px 13px 6px;display:flex;flex-direction:column;gap:10px;scrollbar-width:none;background:transparent;}
    .msgs::-webkit-scrollbar{display:none}

    .row{display:flex;gap:8px;align-items:flex-end;animation:msgIn .3s cubic-bezier(.16,1,.3,1) both}
    .row.u{flex-direction:row-reverse}
    @keyframes msgIn{from{opacity:0;transform:translateY(10px) scale(.97)}to{opacity:1;transform:translateY(0) scale(1)}}

    .mav{width:26px;height:26px;border-radius:8px;flex-shrink:0;display:flex;align-items:center;justify-content:center;overflow:hidden;border:1px solid rgba(255,255,255,.12);}
    .mav svg{width:22px;height:22px}
    .mav.ua{background:rgba(255,255,255,.06);font-size:12px}

    .bub{
      max-width:78%;padding:9px 13px;font-size:14px;font-weight:300;line-height:1.6;
      border-radius:16px;word-break:break-word;
      backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
    }
    /* ultra transparent bubbles */
    .bl{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.13);border-bottom-left-radius:4px;box-shadow:inset 0 1px 0 rgba(255,255,255,.12);}
    .bu{background:rgba(255,255,255,.09);border:1px solid rgba(255,255,255,.18);border-bottom-right-radius:4px;box-shadow:inset 0 1px 0 rgba(255,255,255,.18);}

    .trow{display:flex;gap:8px;align-items:flex-end}
    .tbub{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.1);border-radius:16px;border-bottom-left-radius:4px;padding:11px 14px;display:flex;gap:5px;align-items:center;backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);}
    .td{width:5px;height:5px;border-radius:50%;background:rgba(255,255,255,.4);animation:td 1.2s infinite}
    .td:nth-child(2){animation-delay:.2s}.td:nth-child(3){animation-delay:.4s}
    @keyframes td{0%,60%,100%{transform:translateY(0);opacity:.35}30%{transform:translateY(-5px);opacity:.9}}

    /* input bar */
    .ibar{padding:9px 10px;border-top:1px solid rgba(255,255,255,.07);display:flex;align-items:center;gap:8px;flex-shrink:0;background:rgba(0,0,0,.05);}
    .inp{
      flex:1;min-width:0;
      background:rgba(255,255,255,.04);
      border:1px solid rgba(255,255,255,.14);
      border-radius:14px;padding:10px 15px;
      font-size:16px;font-family:inherit;font-weight:300;color:rgba(255,255,255,.9);outline:none;
      backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
      box-shadow:inset 0 1px 0 rgba(255,255,255,.1);
      transition:border-color .2s,background .2s;
    }
    .inp::placeholder{color:rgba(255,255,255,.18)}
    .inp:focus{border-color:rgba(255,255,255,.28);background:rgba(255,255,255,.07);box-shadow:inset 0 1px 0 rgba(255,255,255,.14),0 0 0 3px rgba(255,255,255,.04);}
    .sbtn{
      width:40px;height:40px;border-radius:12px;flex-shrink:0;
      border:1px solid rgba(255,255,255,.16);background:rgba(255,255,255,.06);color:rgba(255,255,255,.75);
      cursor:pointer;display:flex;align-items:center;justify-content:center;
      backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
      box-shadow:inset 0 1px 0 rgba(255,255,255,.14);transition:all .18s;
    }
    .sbtn:active{background:rgba(255,255,255,.14);transform:scale(.93)}
    .sbtn:disabled{opacity:.25;cursor:not-allowed;transform:none}

    /* chips */
    .chips{width:100%;max-width:540px;display:flex;gap:7px;flex-wrap:wrap;flex-shrink:0;animation:up .7s .18s cubic-bezier(.16,1,.3,1) both;}
    .chip{
      padding:6px 13px;
      background:rgba(255,255,255,.02);border:1px solid rgba(255,255,255,.12);
      border-radius:100px;font-size:12px;font-weight:400;color:rgba(255,255,255,.42);
      cursor:pointer;font-family:inherit;
      backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
      box-shadow:inset 0 1px 0 rgba(255,255,255,.08);transition:all .15s;
    }
    .chip:active{background:rgba(255,255,255,.1);color:rgba(255,255,255,.85)}

    @keyframes up{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
    @media(max-width:400px){.htext h1{font-size:17px}.bub{font-size:13px;max-width:84%}.chip{font-size:11px;padding:5px 10px}}
  </style>
</head>
<body>
<canvas id="sky"></canvas>

<!-- PASSWORD SCREEN -->
<div id="pass-screen" style="display:none;position:fixed;inset:0;z-index:100;align-items:center;justify-content:center;">
  <div style="background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.15);border-radius:24px;padding:2rem 1.5rem;width:90%;max-width:340px;backdrop-filter:blur(32px);-webkit-backdrop-filter:blur(32px);box-shadow:inset 0 1px 0 rgba(255,255,255,0.18),0 20px 60px rgba(0,0,0,0.5);display:flex;flex-direction:column;align-items:center;gap:16px;">
    <div style="width:52px;height:52px;border-radius:16px;background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.18);display:flex;align-items:center;justify-content:center;font-size:24px;">🦁</div>
    <div style="text-align:center;">
      <div style="font-size:20px;font-weight:600;letter-spacing:0.05em;">LION</div>
      <div style="font-size:12px;color:rgba(255,255,255,0.4);margin-top:4px;">Ingresa la contraseña para continuar</div>
    </div>
    <input id="pass-input" type="password" placeholder="Contraseña..." autocomplete="off"
      style="width:100%;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.14);border-radius:14px;padding:11px 16px;font-size:16px;font-family:inherit;color:rgba(255,255,255,0.9);outline:none;backdrop-filter:blur(20px);"
      onkeydown="if(event.key==='Enter')checkPass()"/>
    <div id="pass-error" style="display:none;font-size:12px;color:#f87171;text-align:center;">Contraseña incorrecta</div>
    <button onclick="checkPass()"
      style="width:100%;padding:11px;border-radius:14px;border:1px solid rgba(255,255,255,0.16);background:rgba(255,255,255,0.09);color:rgba(255,255,255,0.85);font-size:14px;font-family:inherit;font-weight:500;cursor:pointer;backdrop-filter:blur(20px);">
      Entrar →
    </button>
  </div>
</div>

<div id="main-app" class="app" style="display:none;">
  <div class="header">
    <div class="logo g"><span class="logo-l">L</span><span class="logo-star s1">★</span><span class="logo-star s2">★</span></div>
    <div class="htext"><h1>LION</h1><p>Inteligencia Artificial Personal</p></div>
    <div class="pill g"><span class="pdot"></span>En línea</div>
  </div>



  <div class="chat-card">
    <div class="topbar">
      <div class="tl">
        <div class="space-av">
          <svg viewBox="0 0 26 26" fill="none" xmlns="http://www.w3.org/2000/svg">
            <circle cx="13" cy="13" r="7" fill="url(#pg)"/>
            <ellipse cx="13" cy="13" rx="12" ry="3.5" stroke="rgba(255,255,255,0.5)" stroke-width="1" fill="none" transform="rotate(-18 13 13)"/>
            <ellipse cx="13" cy="13" rx="10" ry="2.5" stroke="rgba(255,255,255,0.22)" stroke-width=".6" fill="none" transform="rotate(-18 13 13)"/>
            <circle cx="11" cy="11" r="1.2" fill="rgba(255,255,255,0.1)"/>
            <circle cx="15" cy="14" r=".8" fill="rgba(255,255,255,0.07)"/>
            <defs>
              <radialGradient id="pg" cx="35%" cy="30%" r="70%" gradientUnits="objectBoundingBox">
                <stop offset="0%" stop-color="#d4b483"/>
                <stop offset="45%" stop-color="#a07040"/>
                <stop offset="100%" stop-color="#6b4a28"/>
              </radialGradient>
            </defs>
          </svg>
        </div>
        <div><div class="tname">LION</div><div class="tsub">Siempre disponible</div></div>
      </div>
      <button class="clr-btn" onclick="clearChat()">Limpiar</button>
    </div>

    <div class="msgs" id="msgs">
      <div class="row">
        <div class="mav" id="init-av"></div>
        <div class="bub bl">Hola 👋 Soy <strong>LION</strong>, tu IA personal. Estoy listo para ayudarte con lo que necesites. ¿En qué te puedo ayudar?</div>
      </div>
    </div>

    <div class="ibar">
      <input class="inp" type="text" id="chat-input" placeholder="Mensaje a LION..." autocomplete="off" autocorrect="off"/>
      <button class="sbtn" id="sbtn" onclick="send()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>
        </svg>
      </button>
    </div>
  </div>

  <div class="chips" id="chips">
    <button class="chip" onclick="useChip(this)">¿Qué hay más allá del universo?</button>
    <button class="chip" onclick="useChip(this)">Dame ideas creativas</button>
    <button class="chip" onclick="useChip(this)">Cuéntame algo curioso</button>
    <button class="chip" onclick="useChip(this)">Ayúdame con una tarea</button>
  </div>
</div>
</div>

<script>
// init planet avatar
document.getElementById('init-av').innerHTML = planetSVG('i1',22);

// ══ STAR MAP ══
const cv=document.getElementById('sky'),X=cv.getContext('2d');
let W,H,bg=[];

// Dense star field — many more stars
const STARS=[
  // Orion (7)
  [.18,.42,1.6],[.17,.45,.4],[.19,.50,2.0],[.21,.47,1.7],[.20,.44,2.0],[.22,.42,2.8],[.16,.48,2.2],
  // Ursa Major (7)
  [.32,.22,1.8],[.34,.21,2.3],[.36,.20,1.8],[.38,.21,2.0],[.40,.23,1.7],[.41,.25,2.1],[.39,.27,1.9],
  // Scorpius (7)
  [.55,.65,1.0],[.57,.63,2.3],[.56,.68,2.8],[.58,.70,1.6],[.60,.72,2.1],[.59,.66,2.9],[.61,.64,2.7],
  // Cassiopeia (5)
  [.05,.18,2.2],[.07,.17,2.6],[.09,.18,2.3],[.11,.17,2.7],[.13,.18,3.0],
  // Leo (6)
  [.41,.42,1.4],[.43,.40,2.1],[.44,.43,2.5],[.42,.46,2.0],[.45,.41,2.9],[.40,.45,2.8],
  // Virgo (5)
  [.48,.50,.9],[.50,.48,2.8],[.51,.52,2.7],[.49,.54,3.0],[.52,.49,3.1],
  // Gemini (6)
  [.27,.35,1.1],[.28,.33,1.1],[.26,.37,1.9],[.29,.36,2.0],[.27,.39,2.9],[.30,.38,3.0],
  // Taurus (5)
  [.22,.38,.8],[.23,.36,2.8],[.24,.37,1.7],[.21,.39,2.5],[.25,.35,2.9],
  // Auriga (4)
  [.26,.30,.1],[.27,.28,2.6],[.28,.29,2.7],[.25,.31,2.9],
  // Boötes (5)
  [.49,.38,.0],[.50,.36,2.7],[.51,.37,2.5],[.48,.40,2.7],[.52,.39,2.8],
  // Cancer HIGHLIGHTED (6) — idx 60-65
  [.35,.42,3.5],[.36,.40,3.5],[.37,.41,3.7],[.36,.43,3.9],[.38,.42,4.0],[.35,.44,4.1],
  // Libra HIGHLIGHTED (5) — idx 66-70
  [.53,.56,2.7],[.54,.54,2.6],[.55,.57,3.6],[.56,.55,3.8],[.54,.59,3.9],
  // Sagittarius (5)
  [.60,.65,1.8],[.61,.67,2.0],[.62,.63,2.7],[.63,.66,2.8],[.64,.64,2.9],
  // Cygnus (5)
  [.55,.28,1.2],[.56,.26,2.9],[.57,.27,2.4],[.54,.30,3.0],[.58,.28,2.8],
  // Lyra (3)
  [.53,.28,.0],[.54,.27,3.3],[.55,.29,3.5],
  // Aquila (3)
  [.59,.45,.7],[.60,.44,2.7],[.58,.46,3.4],
  // Southern Cross (4)
  [.54,.80,.8],[.55,.82,1.2],[.53,.81,1.6],[.56,.81,2.8],
  // Andromeda (3)
  [.08,.32,2.1],[.09,.30,2.0],[.10,.31,2.2],
  // Pegasus (4)
  [.70,.38,2.4],[.71,.36,2.1],[.72,.38,2.5],[.69,.37,2.8],
  // Perseus (4)
  [.18,.28,1.8],[.19,.27,2.1],[.20,.26,2.9],[.17,.29,3.0],
  // Corvus (4)
  [.48,.62,2.6],[.49,.63,2.8],[.50,.61,2.9],[.47,.63,3.0],
  // Hydra (4)
  [.43,.57,1.9],[.44,.58,3.0],[.45,.56,3.8],[.42,.59,3.9],
  // Capricornus (4)
  [.63,.60,2.9],[.64,.62,3.0],[.65,.61,3.7],[.66,.60,3.8],
  // Aquarius (5)
  [.67,.55,2.9],[.68,.57,3.0],[.69,.54,3.7],[.70,.56,3.5],[.68,.52,3.9],
  // Pisces (4)
  [.75,.48,3.6],[.76,.46,4.0],[.77,.50,3.8],[.74,.49,4.1],
  // Aries (3)
  [.15,.38,2.0],[.16,.37,2.6],[.14,.39,3.6],
  // Centaurus (4)
  [.52,.72,-.3],[.53,.74,.6],[.54,.71,2.1],[.51,.73,2.5],
  // Eridanus (3)
  [.14,.58,.5],[.15,.55,2.8],[.16,.56,3.7],
  // Extra scattered bright
  [.30,.55,2.0],[.60,.35,2.2],[.80,.45,1.9],[.20,.65,2.5],[.88,.30,2.0],
  [.78,.60,2.3],[.10,.50,2.1],[.45,.28,2.4],[.35,.68,2.6],[.65,.48,2.8],
  [.25,.72,2.2],[.85,.55,1.8],[.42,.75,2.7],[.70,.25,2.5],[.15,.25,2.8],
  [.92,.42,2.1],[.03,.60,2.4],[.50,.88,2.6],[.82,.22,2.3],[.38,.88,2.8],
  [.62,.15,2.0],[.72,.70,2.5],[.28,.82,2.7],[.90,.65,2.2],[.05,.75,2.9],
];

const LINES=[
  [0,1],[1,2],[2,3],[3,4],[4,5],[1,6],[0,3],
  [7,8],[8,9],[9,10],[10,11],[11,12],[12,13],[13,11],
  [14,15],[15,16],[16,17],[17,18],[14,20],[20,21],
  [22,23],[23,24],[24,25],[25,26],
  [27,28],[28,29],[29,30],[30,27],[28,31],
  [32,33],[33,34],[34,35],[32,36],
  [37,38],[39,40],[37,39],[38,41],[40,41],
  [42,43],[43,44],[42,45],[44,46],
  [47,48],[48,49],[49,50],[50,47],
  [55,56],[56,57],[57,55],
  [71,72],[72,73],[73,74],[74,71],
  [76,77],[77,78],[78,79],[79,80],
  [81,82],[82,83],[83,81],
  [84,85],[85,86],[86,84],[85,87],
];

const CI=[60,61,62,63,64,65],LI=[66,67,68,69,70];
const CL=[[60,61],[61,62],[62,63],[63,64],[60,65]];
const LL=[[66,67],[67,68],[68,69],[66,70]];

function resize(){
  W=cv.width=innerWidth;H=cv.height=innerHeight;
  // Many more background fill stars
  bg=Array.from({length:Math.floor(W*H/900)},()=>({
    x:Math.random()*W,y:Math.random()*H,
    r:Math.random()*1.1+.1,
    a:Math.random()*.75+.2,
    t:Math.random()*Math.PI*2,
    s:Math.random()*.005+.001
  }));
}

let p=0,pd=1;
function draw(){
  X.clearRect(0,0,W,H);

  // LOTS of bg stars
  bg.forEach(s=>{
    s.t+=s.s;
    const a=(0.2+0.7*Math.abs(Math.sin(s.t)))*s.a;
    X.beginPath();X.arc(s.x,s.y,s.r,0,Math.PI*2);
    X.fillStyle=`rgba(255,255,255,${a})`;X.fill();
  });

  p+=pd*.002;if(p>=1)pd=-1;if(p<=0)pd=1;
  const ca=.6+.4*p;

  // constellation lines — more visible
  X.save();
  X.strokeStyle='rgba(255,255,255,0.22)';
  X.lineWidth=.8;X.setLineDash([3,5]);
  LINES.forEach(([a,b])=>{
    if(!STARS[a]||!STARS[b])return;
    X.beginPath();X.moveTo(STARS[a][0]*W,STARS[a][1]*H);X.lineTo(STARS[b][0]*W,STARS[b][1]*H);X.stroke();
  });
  X.setLineDash([]);X.restore();

  // all constellation stars — brighter
  STARS.forEach((s,i)=>{
    const hi=CI.includes(i)||LI.includes(i);
    const r=hi?2.8:Math.max(.9,2.4-s[2]*.38);
    const a=hi?ca:Math.max(.35,.95-s[2]*.1);
    if(hi){
      // bigger glow for highlighted
      const g=X.createRadialGradient(s[0]*W,s[1]*H,0,s[0]*W,s[1]*H,r*9);
      g.addColorStop(0,`rgba(255,255,255,${a})`);
      g.addColorStop(.3,`rgba(255,255,255,${a*.5})`);
      g.addColorStop(1,'rgba(255,255,255,0)');
      X.beginPath();X.arc(s[0]*W,s[1]*H,r*9,0,Math.PI*2);
      X.fillStyle=g;X.fill();
    } else {
      // small glow for normal stars
      const g=X.createRadialGradient(s[0]*W,s[1]*H,0,s[0]*W,s[1]*H,r*4);
      g.addColorStop(0,`rgba(255,255,255,${a*.8})`);
      g.addColorStop(1,'rgba(255,255,255,0)');
      X.beginPath();X.arc(s[0]*W,s[1]*H,r*4,0,Math.PI*2);
      X.fillStyle=g;X.fill();
    }
    X.beginPath();X.arc(s[0]*W,s[1]*H,r,0,Math.PI*2);
    X.fillStyle=`rgba(255,255,255,${a})`;X.fill();
  });

  // Cancer & Libra highlighted lines — bright
  X.save();
  X.strokeStyle=`rgba(255,255,255,${ca*.85})`;
  X.lineWidth=1.1;X.setLineDash([4,5]);
  [...CL,...LL].forEach(([a,b])=>{
    X.beginPath();X.moveTo(STARS[a][0]*W,STARS[a][1]*H);X.lineTo(STARS[b][0]*W,STARS[b][1]*H);X.stroke();
  });
  X.setLineDash([]);X.restore();

  requestAnimationFrame(draw);
}

// shooting stars — more frequent
function shoot(){
  const el=document.createElement('div');
  Object.assign(el.style,{position:'fixed',width:'1px',height:'1px',background:'white',borderRadius:'50%',left:Math.random()*W+'px',top:Math.random()*(H*.35)+'px',zIndex:'0',pointerEvents:'none'});
  document.body.appendChild(el);
  const d=150+Math.random()*220,a=(18+Math.random()*22)*Math.PI/180;
  el.animate([{transform:'translate(0,0)',opacity:.95,width:'1px'},{transform:`translate(${Math.cos(a)*d}px,${Math.sin(a)*d}px)`,opacity:0,width:'80px'}],{duration:550,easing:'ease-in'}).onfinish=()=>el.remove();
}

resize();draw();
setInterval(shoot,3500);
window.addEventListener('resize',resize);

// ══ PLANET SVG ══
function planetSVG(uid,sz){
  return`<svg viewBox="0 0 ${sz} ${sz}" fill="none" xmlns="http://www.w3.org/2000/svg">
    <circle cx="${sz/2}" cy="${sz/2}" r="${sz*.3}" fill="url(#pg${uid})"/>
    <ellipse cx="${sz/2}" cy="${sz/2}" rx="${sz*.46}" ry="${sz*.135}" stroke="rgba(255,255,255,0.5)" stroke-width=".9" fill="none" transform="rotate(-18 ${sz/2} ${sz/2})"/>
    <ellipse cx="${sz/2}" cy="${sz/2}" rx="${sz*.38}" ry="${sz*.1}" stroke="rgba(255,255,255,0.22)" stroke-width=".5" fill="none" transform="rotate(-18 ${sz/2} ${sz/2})"/>
    <defs>
      <radialGradient id="pg${uid}" cx="35%" cy="30%" r="70%" gradientUnits="objectBoundingBox">
        <stop offset="0%" stop-color="#d4b483"/>
        <stop offset="45%" stop-color="#a07040"/>
        <stop offset="100%" stop-color="#6b4a28"/>
      </radialGradient>
    </defs>
  </svg>`;
}

// ══ PASSWORD ══
let appPassword='';
function showPassScreen(){
  document.getElementById('pass-screen').style.display='flex';
  document.getElementById('main-app').style.display='none';
}
async function checkPass(){
  const p=document.getElementById('pass-input').value.trim();
  if(!p)return;
  const btn=document.querySelector('#pass-screen button');
  const err=document.getElementById('pass-error');
  btn.textContent='Verificando...';btn.disabled=true;
  try{
    const r=await fetch('/api/chats',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({messages:[{role:'user',content:'hola'}],password:p})
    });
    if(r.status===401){
      err.style.display='block';
      btn.textContent='Entrar →';btn.disabled=false;
      document.getElementById('pass-input').value='';
      return;
    }
    appPassword=p;
    document.getElementById('pass-screen').style.display='none';
    document.getElementById('main-app').style.display='flex';
  }catch(e){
    err.style.display='block';
    btn.textContent='Entrar →';btn.disabled=false;
  }
}
document.addEventListener('DOMContentLoaded',showPassScreen);

// ══ CHAT ══
const history=[];
async function callLion(msgs, onChunk){
  const r=await fetch('/api/chats',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({messages:msgs,password:appPassword})
  });
  if(r.status===401){appPassword='';showPassScreen();throw new Error('Contraseña incorrecta');}
  if(!r.ok){const e=await r.json().catch(()=>({}));throw new Error(e.error?.message||'Error '+r.status);}
  const reader=r.body.getReader();
  const decoder=new TextDecoder();
  let full='';
  while(true){
    const{done,value}=await reader.read();
    if(done)break;
    const chunk=decoder.decode(value,{stream:true});
    full+=chunk;
    onChunk(chunk);
  }
  return full;
}

function addBubble(text,role){
  const box=document.getElementById('msgs');
  const row=document.createElement('div');row.className='row'+(role==='user'?' u':'');
  const av=document.createElement('div');
  if(role==='user'){av.className='mav ua';av.textContent='👤';}
  else{av.className='mav';av.innerHTML=planetSVG('av'+Date.now(),22);}
  const b=document.createElement('div');b.className='bub '+(role==='user'?'bu':'bl');b.textContent=text;
  row.appendChild(av);row.appendChild(b);box.appendChild(row);box.scrollTop=box.scrollHeight;
  return b;
}

function addTyping(){
  const box=document.getElementById('msgs');
  const row=document.createElement('div');row.className='trow';row.id='typing';
  const av=document.createElement('div');av.className='mav';av.innerHTML=planetSVG('tp'+Date.now(),22);
  const b=document.createElement('div');b.className='tbub';
  b.innerHTML='<div class="td"></div><div class="td"></div><div class="td"></div>';
  row.appendChild(av);row.appendChild(b);box.appendChild(row);box.scrollTop=box.scrollHeight;
}

async function send(){
  const inp=document.getElementById('chat-input'),btn=document.getElementById('sbtn');
  const text=inp.value.trim();if(!text)return;
  inp.value='';btn.disabled=true;
  document.getElementById('chips').style.display='none';
  addBubble(text,'user');
  history.push({role:'user',content:text});
  addTyping();
  try{
    // create streaming bubble
    const box=document.getElementById('msgs');
    let streamBub=null;
    const reply=await callLion([...history],(chunk)=>{
      if(!streamBub){
        document.getElementById('typing')?.remove();
        const row=document.createElement('div');row.className='row';
        const av=document.createElement('div');av.className='mav';av.innerHTML=planetSVG('av'+Date.now(),22);
        streamBub=document.createElement('div');streamBub.className='bub bl';
        row.appendChild(av);row.appendChild(streamBub);
        box.appendChild(row);
      }
      streamBub.textContent+=chunk;
      box.scrollTop=box.scrollHeight;
    });
    history.push({role:'assistant',content:reply});
  }catch(e){
    document.getElementById('typing')?.remove();
    addBubble('Error: '+e.message,'assistant');
  }
  btn.disabled=false;inp.focus();
}

document.getElementById('chat-input').addEventListener('keydown',e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();send();}});
function useChip(el){document.getElementById('chat-input').value=el.textContent.trim();send();}
function clearChat(){
  history.length=0;document.getElementById('msgs').innerHTML='';
  addBubble('Chat reiniciado. ¿En qué te puedo ayudar?','assistant');
  document.getElementById('chips').style.display='flex';
}
</script>
